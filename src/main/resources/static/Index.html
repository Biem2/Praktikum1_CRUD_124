<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Praktikum 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body class="container mt-5">
<h2 class="mb-4">Daftar Pengguna</h2>

<!-- Form Input -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title" id="formTitle">Tambah User</h5>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Nama</label>
                    <input type="text" id="userName" class="form-control" placeholder="Nama lengkap" maxlength="50" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Umur</label>
                    <input type="number" id="userAge" class="form-control" placeholder="Umur" required>
                </div>
                <div class="col-md-4 d-flex align-items-end gap-2">
                    <button type="submit" id="btnSubmit" class="btn btn-primary">Submit</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Tabel User -->
<table class="table table-bordered table-striped" id="userTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Umur</th>
        <th>Aksi</th>
    </tr>
    </thead>
    <tbody id="userTableBody">
    <!-- Data akan diisi oleh JavaScript -->
    </tbody>
</table>

<script>
    const apiUrl = '/api/users';
    let isUpdate = false;

    $(document).ready(function() {
        loadUsers();
    });

    $('#userForm').submit(function(e) {
        e.preventDefault();
        const userData = {
            name: $('#userName').val(),
            age: parseInt($('#userAge').val())
        };
        if (isUpdate) {
            const id = $('#userId').val();
            updateUser(id, userData);
        } else {
            addUser(userData);
        }
    });

    $('#btnCancel').click(function() {
        resetForm();
    });

    function loadUsers() {
        $.get(apiUrl, function(response) {
            let rows = '';
            response.data.forEach(user => {
                rows += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.age}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editUser(${user.id}, '${user.name}', ${user.age})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Hapus</button>
                        </td>
                    </tr>
                `;
            });
            $('#userTableBody').html(rows);
        }).fail(function() {
            alert('Gagal memuat data.');
        });
    }

    function addUser(data) {
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                resetForm();
                loadUsers();
                alert('User berhasil ditambahkan (ID otomatis)');
            },
            error: function() {
                alert('Gagal menambah user.');
            }
        });
    }

    function updateUser(id, data) {
        $.ajax({
            url: `${apiUrl}/${id}`,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                resetForm();
                loadUsers();
                alert('User berhasil diperbarui.');
            },
            error: function() {
                alert('Gagal memperbarui user.');
            }
        });
    }

    function deleteUser(id) {
        if (confirm('Yakin ingin menghapus user ini?')) {
            $.ajax({
                url: `${apiUrl}/${id}`,
                type: 'DELETE',
                success: function() {
                    loadUsers();
                    alert('User telah dihapus.');
                },
                error: function() {
                    alert('Gagal menghapus user.');
                }
            });
        }
    }

    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name);
        $('#userAge').val(age);
        $('#formTitle').text('Edit User');
        $('#btnSubmit').text('Update');
        isUpdate = true;
    }

    function resetForm() {
        $('#userId').val('');
        $('#userName').val('');
        $('#userAge').val('');
        $('#formTitle').text('Tambah User');
        $('#btnSubmit').text('Submit');
        isUpdate = false;
    }
</script>
</body>
</html>
