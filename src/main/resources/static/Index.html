<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Praktikum 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .error-message {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body class="container mt-5">
<h2 class="mb-4 text-center">Daftar Pengguna</h2>

<!-- Error Message -->
<div id="errorAlert" class="error-message">
    <strong>localhost:8080 menyatakan:</strong> Gagal menambah user.
    <button type="button" class="btn-close float-end" onclick="this.parentElement.classList.remove('show')"></button>
</div>

<!-- Form Input -->
<div class="card mb-4 shadow-sm">
    <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0" id="formTitle">Tambah User Baru</h5>
    </div>
    <div class="card-body">
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nama Lengkap</label>
                    <input type="text" id="userName" class="form-control"
                           placeholder="Kesya Utami Putri" maxlength="50" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">Umur</label>
                    <input type="number" id="userAge" class="form-control"
                           placeholder="20" min="1" max="150" required>
                </div>
                <div class="col-md-3 mb-3 d-flex align-items-end">
                    <button type="submit" id="btnSubmit" class="btn btn-primary me-2">Submit</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Tabel User -->
<div class="card shadow-sm">
    <div class="card-header bg-secondary text-white">
        <h5 class="card-title mb-0">Data Pengguna</h5>
    </div>
    <div class="card-body">
        <table class="table table-bordered table-striped table-hover" id="userTable">
            <thead class="table-dark">
            <tr>
                <th width="10%">ID</th>
                <th width="40%">Nama</th>
                <th width="20%">Umur</th>
                <th width="30%">Aksi</th>
            </tr>
            </thead>
            <tbody id="userTableBody">
            <tr>
                <td colspan="4" class="text-center text-muted">Belum ada data. Silakan tambah user baru.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Konfirmasi Hapus</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Apakah Anda yakin ingin menghapus user ini?</p>
                <p class="fw-bold" id="deleteUserName"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-danger" id="confirmDelete">Hapus</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const apiUrl = '/api/users';
    let isUpdate = false;
    let deleteId = null;

    $(document).ready(function() {
        loadUsers();
    });

    // Tampilkan error alert
    function showError(message) {
        $('#errorAlert').html(`<strong>localhost:8080 menyatakan:</strong> ${message}`)
                       .addClass('show');

        // Auto hide setelah 5 detik
        setTimeout(() => {
            $('#errorAlert').removeClass('show');
        }, 5000);
    }

    // Sembunyikan error alert
    function hideError() {
        $('#errorAlert').removeClass('show');
    }

    // Submit form
    $('#userForm').submit(function(e) {
        e.preventDefault();
        hideError();

        const name = $('#userName').val().trim();
        const age = $('#userAge').val();

        if (!name || !age) {
            showError('Nama dan umur harus diisi!');
            return;
        }

        const userData = {
            name: name,
            age: parseInt(age)
        };

        if (isUpdate) {
            const id = $('#userId').val();
            updateUser(id, userData);
        } else {
            addUser(userData);
        }
    });

    // Cancel button
    $('#btnCancel').click(function() {
        resetForm();
    });

    // Load semua user (GET)
    function loadUsers() {
        $.ajax({
            url: apiUrl,
            type: 'GET',
            dataType: 'json',
            timeout: 5000, // 5 detik timeout
            success: function(response) {
                let rows = '';

                // Cek struktur response
                const users = response.data || response || [];

                if (users.length === 0) {
                    rows = '<tr><td colspan="4" class="text-center text-muted">Belum ada data. Silakan tambah user baru.</td></tr>';
                } else {
                    users.forEach(user => {
                        rows += `
                            <tr>
                                <td class="fw-bold">${user.id || '-'}</td>
                                <td>${user.name || user.nama || '-'}</td>
                                <td>${user.age || user.umur || '-'}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning me-1" onclick="editUser(${user.id}, '${user.name || user.nama}', ${user.age || user.umur})">
                                        Edit
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="showDeleteModal(${user.id}, '${user.name || user.nama}')">
                                        Hapus
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }

                $('#userTableBody').html(rows);
            },
            error: function(xhr, status, error) {
                console.error('Error loading users:', error);
                showError('Gagal memuat data dari server. Pastikan server berjalan.');
                $('#userTableBody').html('<tr><td colspan="4" class="text-center text-danger">Gagal memuat data</td></tr>');
            }
        });
    }

    // Tambah user (POST)
    function addUser(data) {
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            timeout: 5000,
            success: function(response) {
                resetForm();
                loadUsers();

                // Tampilkan pesan sukses
                alert('✅ User berhasil ditambahkan!');
            },
            error: function(xhr, status, error) {
                console.error('Error adding user:', error);

                let errorMsg = 'Gagal menambah user. ';
                if (xhr.status === 404) {
                    errorMsg += 'Endpoint API tidak ditemukan.';
                } else if (xhr.status === 500) {
                    errorMsg += 'Terjadi kesalahan di server.';
                } else {
                    errorMsg += 'Periksa koneksi ke server.';
                }

                showError(errorMsg);
            }
        });
    }

    // Update user (PUT)
    function updateUser(id, data) {
        $.ajax({
            url: `${apiUrl}/${id}`,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data),
            timeout: 5000,
            success: function(response) {
                resetForm();
                loadUsers();
                alert('✅ User berhasil diperbarui!');
            },
            error: function(xhr, status, error) {
                console.error('Error updating user:', error);
                showError('Gagal memperbarui user. Periksa koneksi ke server.');
            }
        });
    }

    // Hapus user (DELETE)
    function deleteUser(id) {
        $.ajax({
            url: `${apiUrl}/${id}`,
            type: 'DELETE',
            timeout: 5000,
            success: function(response) {
                // Tutup modal
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadUsers();
                alert('✅ User berhasil dihapus!');
            },
            error: function(xhr, status, error) {
                console.error('Error deleting user:', error);
                showError('Gagal menghapus user. Periksa koneksi ke server.');
            }
        });
    }

    // Tampilkan modal konfirmasi hapus
    function showDeleteModal(id, name) {
        deleteId = id;
        $('#deleteUserName').text(`"${name}" (ID: ${id})`);

        const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
        modal.show();
    }

    // Confirm delete button
    $('#confirmDelete').click(function() {
        if (deleteId) {
            deleteUser(deleteId);
        }
    });

    // Edit user
    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name);
        $('#userAge').val(age);
        $('#formTitle').text('Edit User');
        $('#btnSubmit').text('Update');
        isUpdate = true;

        // Scroll ke form
        $('html, body').animate({
            scrollTop: $('.card').first().offset().top
        }, 500);
    }

    // Reset form ke mode tambah
    function resetForm() {
        $('#userId').val('');
        $('#userName').val('');
        $('#userAge').val('');
        $('#formTitle').text('Tambah User Baru');
        $('#btnSubmit').text('Submit');
        isUpdate = false;
        hideError();
    }

    // Simulasi data jika backend belum siap
    // Hapus fungsi ini jika backend sudah siap
    function useMockData() {
        // Data contoh
        const mockUsers = [
            { id: 1, name: 'Kesya Utami Putri', age: 20 },
            { id: 2, name: 'Budi Santoso', age: 25 },
            { id: 3, name: 'Siti Aminah', age: 22 }
        ];

        let rows = '';
        mockUsers.forEach(user => {
            rows += `
                <tr>
                    <td class="fw-bold">${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.age}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editUser(${user.id}, '${user.name}', ${user.age})">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="showDeleteModal(${user.id}, '${user.name}')">Hapus</button>
                    </td>
                </tr>
            `;
        });
        $('#userTableBody').html(rows);
    }

    // Uncomment baris di bawah untuk menggunakan data contoh jika backend belum siap
    // $(document).ready(function() {
    //     useMockData();
    // });
</script>
</body>
</html>
